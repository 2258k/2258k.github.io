<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0B0E14; --surface: #141820; --border: #252C3D;
  --text: #ffffff; --muted: #A0A8BB; --dim: #5A637A;
  --accent: #60A5FA; --primary: #3B82F6;
}
html, body { background: var(--bg); color: var(--text); min-height: 100vh; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
  padding: 24px 20px 48px;
  -webkit-font-smoothing: antialiased;
}
.container { max-width: 520px; margin: 0 auto; }
.brand { text-align: center; margin-bottom: 28px; }
.brand h1 { color: var(--primary); font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
.brand p { color: var(--muted); font-size: 11px; margin-top: 4px; }
.centre-header {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 20px;
}
.centre-dot { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; }
.centre-name { font-size: 22px; font-weight: 700; }
.cta {
  display: block; background: var(--primary); color: white;
  text-align: center; padding: 14px 18px; border-radius: 12px;
  font-weight: 600; font-size: 15px; text-decoration: none;
  margin-bottom: 8px; transition: opacity 0.15s;
}
.cta:hover { opacity: 0.9; }
.cta-hint {
  text-align: center; color: var(--dim); font-size: 12px;
  margin-bottom: 24px;
}
.info-grid { display: grid; gap: 10px; margin-bottom: 24px; }
.info-row {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 14px;
}
.info-label {
  color: var(--accent); font-size: 10px; font-weight: 700;
  letter-spacing: 1px; margin-bottom: 4px; text-transform: uppercase;
}
.info-value { font-size: 14px; color: var(--text); word-wrap: break-word; }
.info-value a { color: var(--accent); text-decoration: none; }
.footer {
  text-align: center; color: var(--dim);
  font-size: 11px; margin-top: 28px;
}
</style>
</head>
<body>
<div class="container">
  <div class="brand">
    <h1>Blue Sky</h1>
    <p>tous les évènements, un seul ciel.</p>
  </div>
  <div id="content"></div>
</div>

  "chambery":         {"name":"Chambéry Aix-les-Bains","color":"#A5F3FC","region":"Auvergne-RA","official":"SARL SAVOIE PARACHUTISME","address":"Aéroport de Chambéry-Aix-les-Bains, 73420 Viviers-du-Lac","phone":"06 13 09 61 56","website":"http://www.savoieparachutisme.com"}
};

function render() {
  const m = window.location.pathname.match(/\/centre\/([^/?#]+)/);
  const id = m ? decodeURIComponent(m[1]) : null;
  const c = id ? CENTRES[id] : null;
  const el = document.getElementById('content');

  if (!c) {
    el.innerHTML = `
      <p class="cta-hint" style="margin-top:24px">Découvre les calendriers 2026 de tous les centres de parachutisme français.</p>
      <a class="cta" href="${APP_STORE}">Télécharger sur l'App Store</a>
    `;
    return;
  }

  document.title = c.name + " — Blue Sky";
  document.querySelector('meta[property="og:title"]').setAttribute('content', c.name + " — Blue Sky");
  document.querySelector('meta[property="og:description"]').setAttribute('content', "Calendrier 2026 du centre " + c.name);

  let h = `
    <div class="centre-header">
      <div class="centre-dot" style="background:${c.color}"></div>
      <h2 class="centre-name">${esc(c.name)}</h2>
    </div>
    <a class="cta" href="${APP_STORE}">Ouvrir / Télécharger Blue Sky</a>
    <p class="cta-hint">Le calendrier complet est dans l'app.</p>
    <div class="info-grid">
  `;
  if (c.official) h += row("Nom officiel", esc(c.official));
  if (c.address)  h += row("Adresse", esc(c.address));
  if (c.region)   h += row("Région", esc(c.region));
  if (c.phone)    h += row("Téléphone", `<a href="tel:${c.phone.replace(/\s/g,'')}">${esc(c.phone)}</a>`);
  if (c.website)  h += row("Site internet", `<a href="${c.website}" target="_blank" rel="noopener">${esc(c.website)}</a>`);
  h += '</div><p class="footer">Blue Sky · Calendrier parachutisme 2026</p>';
  el.innerHTML = h;
}

function row(label, val) {
  return `<div class="info-row"><div class="info-label">${label}</div><div class="info-value">${val}</div></div>`;
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

render();
</script>
</body>
</html>
